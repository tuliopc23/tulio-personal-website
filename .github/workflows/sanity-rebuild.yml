name: Sanity Rebuild

on:
  repository_dispatch:
    types:
      - sanity-rebuild
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PUBLIC_SANITY_PROJECT_ID: 61249gtj
      PUBLIC_SANITY_DATASET: production
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}
      PUBLIC_SANITY_VISUAL_EDITING_ENABLED: ${{ secrets.PUBLIC_SANITY_VISUAL_EDITING_ENABLED }}
      SANITY_ALLOW_BUILD_FALLBACK: ${{ secrets.SANITY_ALLOW_BUILD_FALLBACK }}
      PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight
        run: pnpm run deploy:preflight

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
