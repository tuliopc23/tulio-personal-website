name: Rebuild on Sanity Content Update

on:
  repository_dispatch:
    types: [sanity-content-update]

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Log webhook trigger
        run: |
          echo "✅ Sanity content updated - triggering Cloudflare rebuild"
          echo "Document: ${{ github.event.client_payload.title }}"
          echo "Operation: ${{ github.event.client_payload.operation }}"
      - name: Trigger Cloudflare deploy hook
        env:
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$CLOUDFLARE_DEPLOY_HOOK_URL" ]; then
            echo "❌ Missing CLOUDFLARE_DEPLOY_HOOK_URL secret"
            exit 1
          fi

          curl -fsS -X POST "$CLOUDFLARE_DEPLOY_HOOK_URL"
          echo "✅ Cloudflare deploy hook triggered"
