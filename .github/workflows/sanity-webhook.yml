name: Rebuild on Sanity Content Update

on:
  repository_dispatch:
    types: [sanity-content-update]

permissions:
  contents: write

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log webhook trigger
        run: |
          echo "✅ Sanity content updated - triggering Cloudflare rebuild"
          echo "Document: ${{ github.event.client_payload.title }}"
          echo "Operation: ${{ github.event.client_payload.operation }}"

      - name: Trigger Cloudflare deploy hook
        env:
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$CLOUDFLARE_DEPLOY_HOOK_URL" ]; then
            echo "ℹ️ Missing deploy hook secret; falling back to git-push deploy trigger"
            exit 0
          fi

          curl -fsS -X POST "$CLOUDFLARE_DEPLOY_HOOK_URL"
          echo "✅ Cloudflare deploy hook triggered"

      - name: Fallback git-push deploy trigger
        if: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL == '' }}
        run: |
          git config user.name "Sanity Webhook"
          git config user.email "webhook@sanity.io"
          git commit --allow-empty -m "chore: rebuild from sanity content update [skip ci]"
          git push origin main
          echo "✅ Fallback git push trigger executed"
