name = "tulio-personal-website"
compatibility_date = "2026-01-27"

[assets]
directory = "./dist"

[vars]
PUBLIC_SANITY_PROJECT_ID = "61249gtj"
PUBLIC_SANITY_DATASET = "production"
GITHUB_REPOSITORY = "tuliopc23/tulio-personal-website"

[env.stg.vars]
PUBLIC_SANITY_PROJECT_ID = "61249gtj"
PUBLIC_SANITY_DATASET = "production"
GITHUB_REPOSITORY = "tuliopc23/tulio-personal-website"

[env.prd.vars]
PUBLIC_SANITY_PROJECT_ID = "61249gtj"
PUBLIC_SANITY_DATASET = "production"
GITHUB_REPOSITORY = "tuliopc23/tulio-personal-website"

# Cron triggers for scheduled publishing
# Runs every 15 minutes to check for posts that should be published
[triggers]
crons = ["*/15 * * * *"]

[env.prd.triggers]
crons = ["*/15 * * * *"]
