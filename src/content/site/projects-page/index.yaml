caseStudies:
  - icon: desktop-tower
    eyebrow: Indie App
    title: CardManiacs
    headline: A native content platform built from scratch with Swift and strict
      concurrency.
    lede: Three apps in one — reader, aggregator, and discovery engine. Mac-first,
      optimized for iOS and iPadOS. Vim-style keyboard navigation on the card
      grid, on-device AI summaries, and the ability to parse everything from RSS
      feeds to YouTube videos and podcasts. No Electron. No wrappers. Pure
      platform code.
    role: Creator & Solo Developer
    status: live
    href: null
    stack:
      - Swift
      - SwiftUI
      - AppKit
      - Strict Concurrency
      - ""
    images:
      - alt: Cardmaniacs rendering a article
        url: /src/assets/images/case-studies/cardmaniacs-1.png
      - alt: Article Card Grid in Cardmaniacs
        url: /src/assets/images/case-studies/cardmaniacs-2.png
  - icon: soccer-ball
    eyebrow: Publication
    title: The Offside
    headline: A football publication with league tables, real-time data, and a
      Highbury-inspired soul.
    lede: International football publication focused on the Premier League and
      European football. Svelte components powering live league tables,
      aggressive caching, load balancing, and a design language inspired by
      Highbury and Aimé Leon Dore — designed and built for a long-time friend.
      Arsenal through and through. Go Gunners.
    role: Designer & Lead Developer
    status: live
    href: https://theoffside.club
    stack:
      - Svelte
      - SvelteKit
      - Tailwind CSS
    images:
      - alt: The Offside editorial homepage with Highbury-inspired design
        url: /src/assets/images/case-studies/offside-1.jpg
      - alt: Premier league table in The Offside
        url: /src/assets/images/case-studies/offside-2.jpg
  - icon: chart-line-up
    eyebrow: Client Work
    title: Capital Financial Consulting
    headline: A wealth management platform with dashboards, charts, and guided
      financial planning.
    lede: Rich web platform for an independent financial consulting firm in Brazil.
      Beautiful data visualizations, fast dashboards, and an intuitive
      experience for both consultants and clients. Think a top-notch personal
      finance app, but with a real professional guiding your financial health —
      not an algorithm.
    role: Full Stack Developer
    status: live
    href: null
    stack:
      - React
      - PostgreSQL
      - Hono
    images:
      - alt: Capital Financial Consulting landing page
        url: /src/assets/images/case-studies/capital-1.jpg
      - alt: Capital Financial Consulting consultant dashboard with charts
        url: /src/assets/images/case-studies/capital-2.png
  - icon: compass
    eyebrow: Client Work
    title: Nomadz Trips
    headline: A travel platform that handles bookings, content, and payments behind
      one seamless experience.
    lede: International travel agency specializing in group experiences. SSR pages
      tuned for SEO with a full operational backend — custom dashboard, Stripe
      integration, CMS-driven content, and a blog that actually ranks. The
      frontend looks effortless; the infrastructure behind it is anything but.
    role: Full Stack Developer
    status: live
    href: null
    stack:
      - Payload CMS
      - React
      - Tailwind CSS
      - Stripe
    images:
      - alt: Nomadz Trips homepage with aerial beach photography
        url: /src/assets/images/case-studies/nomadz-1.jpg
      - alt: Nomadz Trips trip listing and booking interface
        url: /src/assets/images/case-studies/nomadz-2.jpg
